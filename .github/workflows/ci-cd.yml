name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    name: Lending Contract CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

        
        
        
        
      - name: Set toolchain env variable
        run: echo "toolchain=stable" >> $GITHUB_ENV

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            stellar-lend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: |
          cd stellar-lend/contracts/lending
          cargo fmt -- --check
          cd ../hello-world
          cargo fmt -- --check

      - name: Run clippy
        run: |
          cd stellar-lend/contracts/lending
          cargo clippy --all-targets --all-features -- -D warnings -A deprecated -A dead_code
          cd ../hello-world
          cargo clippy --all-targets --all-features -- -D warnings -A deprecated -A dead_code

      - name: Build project
        run: |
          cd stellar-lend/contracts/lending
          cargo build --verbose
          cd ../hello-world
          cargo build --verbose

      - name: Run tests
        run: |
          cd stellar-lend/contracts/lending
          cargo test --verbose
          cd ../hello-world
          cargo test --verbose

      - name: Generate lending test report
        run: |
          cd stellar-lend/contracts/lending
          cargo test --verbose -- --nocapture > lending_test_report.txt
          cat lending_test_report.txt

      - name: Generate hello-world test report
        run: |
          cd stellar-lend/contracts/hello-world
          cargo test --verbose -- --nocapture > hello_world_test_report.txt
          cat hello_world_test_report.txt

      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            stellar-lend/contracts/lending/lending_test_report.txt
            stellar-lend/contracts/hello-world/hello_world_test_report.txt

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin --locked --version 0.31.0

      - name: Generate code coverage
        run: |
          cd stellar-lend/contracts/lending
          cargo tarpaulin --verbose --out Xml --packages stellarlend-lending --exclude-files "../../indexing_system/*" ../../indexing_system/*
          cd ../hello-world
          cargo tarpaulin --verbose --out Xml --fail-under 88

      - name: Enforce lending crate coverage threshold
        run: python3 scripts/enforce_coverage.py stellar-lend/contracts/lending/cobertura.xml --threshold 95.0

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run security audit
        run: |
          cd stellar-lend
          cargo audit --ignore RUSTSEC-2026-0049 --ignore RUSTSEC-2025-0009 --ignore RUSTSEC-2023-0071 --ignore RUSTSEC-2024-0363
